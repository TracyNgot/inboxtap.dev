name: Release to npm

on:
  pull_request_target:
    branches:
      - main
    types:
      - closed
  workflow_dispatch:
    inputs:
      tag:
        description: Existing release tag to resume, for example v0.1.1
        required: true
        type: string

permissions:
  contents: write
  id-token: write

concurrency:
  group: ${{ github.workflow }}-main
  cancel-in-progress: false

jobs:
  release:
    if: github.event_name == 'workflow_dispatch' || github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Check out the trusted release commit
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || 'main' }}

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - name: Set up Node and npm
        uses: actions/setup-node@v6
        with:
          node-version: 24
          package-manager-cache: false
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Prepare or resume the release
        id: release
        env:
          MANUAL_TAG: ${{ inputs.tag }}
          SOURCE_BRANCH: ${{ github.event.pull_request.head.ref }}
        run: |
          set -euo pipefail

          if [[ "$GITHUB_EVENT_NAME" == "workflow_dispatch" ]]; then
            if [[ ! "$MANUAL_TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
              echo "Expected a stable semantic version tag such as v0.1.1" >&2
              exit 1
            fi

            version=$(node -p "require('./package.json').version")
            if [[ "$MANUAL_TAG" != "v${version}" ]]; then
              echo "Tag ${MANUAL_TAG} does not match package version ${version}" >&2
              exit 1
            fi
            if [[ "$(git rev-parse "${MANUAL_TAG}^{commit}")" != "$(git rev-parse HEAD)" ]]; then
              echo "Checked-out commit is not tagged with ${MANUAL_TAG}" >&2
              exit 1
            fi

            echo "tag=${MANUAL_TAG}" >> "$GITHUB_OUTPUT"
            echo "version=${version}" >> "$GITHUB_OUTPUT"
            echo "prepared=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          level=$(bun scripts/release-policy.ts "$SOURCE_BRANCH")
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          bun run "release:${level}"

          version=$(node -p "require('./package.json').version")
          tag="v${version}"
          git push --atomic origin main "refs/tags/${tag}"

          echo "tag=${tag}" >> "$GITHUB_OUTPUT"
          echo "version=${version}" >> "$GITHUB_OUTPUT"
          echo "prepared=true" >> "$GITHUB_OUTPUT"

      - name: Verify the resumed release
        if: steps.release.outputs.prepared == 'false'
        run: bun run release:check

      - name: Check whether the version is already published
        id: registry
        env:
          RELEASE_VERSION: ${{ steps.release.outputs.version }}
        run: |
          set -euo pipefail

          package_name=$(node -p "require('./package.json').name")
          local_integrity=$(
            npm pack --dry-run --ignore-scripts --json |
              node -e '
                let input = "";
                process.stdin.on("data", (chunk) => (input += chunk));
                process.stdin.on("end", () => {
                  const [packed] = JSON.parse(input);
                  if (!packed?.integrity) throw new Error("npm pack did not return package integrity");
                  process.stdout.write(packed.integrity);
                });
              '
          )

          if registry_integrity=$(npm view "${package_name}@${RELEASE_VERSION}" dist.integrity 2>/dev/null); then
            if [[ "$registry_integrity" != "$local_integrity" ]]; then
              echo "npm already has ${package_name}@${RELEASE_VERSION} with different contents" >&2
              exit 1
            fi
            echo "publish_required=false" >> "$GITHUB_OUTPUT"
            echo "${package_name}@${RELEASE_VERSION} is already published with matching contents"
          else
            echo "publish_required=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish to npm
        if: steps.registry.outputs.publish_required == 'true'
        run: npm publish --access public

      - name: Create the GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ steps.release.outputs.tag }}
        run: |
          if gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
            echo "GitHub release ${RELEASE_TAG} already exists"
          else
            gh release create "$RELEASE_TAG" --generate-notes --title "$RELEASE_TAG" --verify-tag
          fi
