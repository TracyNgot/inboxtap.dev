name: Release to npm

on:
  pull_request_target:
    branches:
      - main
    # Keep this list aligned with LIBRARY_RELEASE_PATHS in
    # scripts/release-policy.ts.
    paths:
      - "src/**"
    types:
      - closed
  workflow_dispatch:
    inputs:
      tag:
        description: Existing release tag to resume, for example v0.1.1
        required: false
        type: string
      bump:
        description: Version bump for a new on-demand release, for example major to cut v1.0.0
        required: false
        type: choice
        default: none
        options:
          - none
          - patch
          - minor
          - major

permissions:
  contents: write
  id-token: write
  pull-requests: read

concurrency:
  group: ${{ github.workflow }}-main
  cancel-in-progress: false

jobs:
  release:
    if: github.event_name == 'workflow_dispatch' || github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Check out the trusted release commit
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          fetch-depth: 0
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || 'main' }}

      - name: Set up Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: 1.3.14

      - name: Set up Node and npm
        uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6
        with:
          node-version: 24
          package-manager-cache: false
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Prepare or resume the release
        id: release
        env:
          GH_TOKEN: ${{ github.token }}
          MANUAL_TAG: ${{ inputs.tag }}
          MANUAL_BUMP: ${{ inputs.bump }}
          SOURCE_BRANCH: ${{ github.event.pull_request.head.ref }}
          SOURCE_PR: ${{ github.event.pull_request.number }}
        run: |
          set -euo pipefail

          if [[ "$GITHUB_EVENT_NAME" == "workflow_dispatch" ]]; then
            if [[ -n "$MANUAL_TAG" && -n "$MANUAL_BUMP" && "$MANUAL_BUMP" != "none" ]]; then
              echo "Provide either an existing tag to resume or a bump level, not both" >&2
              exit 1
            fi

            if [[ -n "$MANUAL_TAG" ]]; then
              if [[ ! "$MANUAL_TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
                echo "Expected a stable semantic version tag such as v0.1.1" >&2
                exit 1
              fi

              version=$(node -p "require('./package.json').version")
              if [[ "$MANUAL_TAG" != "v${version}" ]]; then
                echo "Tag ${MANUAL_TAG} does not match package version ${version}" >&2
                exit 1
              fi
              if [[ "$(git rev-parse "${MANUAL_TAG}^{commit}")" != "$(git rev-parse HEAD)" ]]; then
                echo "Checked-out commit is not tagged with ${MANUAL_TAG}" >&2
                exit 1
              fi

              echo "tag=${MANUAL_TAG}" >> "$GITHUB_OUTPUT"
              echo "version=${version}" >> "$GITHUB_OUTPUT"
              echo "prepared=false" >> "$GITHUB_OUTPUT"
              exit 0
            fi

            if [[ -z "$MANUAL_BUMP" || "$MANUAL_BUMP" == "none" ]]; then
              echo "Provide an existing tag to resume or a bump level for a new release" >&2
              exit 1
            fi

            # Dispatching a bump is already an explicit human decision, so it
            # does not need the breaking-label confirmation required below for
            # majors derived from merged branches.
            level="$MANUAL_BUMP"
          else
            # Derive the bump from every pull request merged since the last
            # release tag that changed src/, not only the triggering
            # one. Release notes remain unfiltered so deferred website and
            # documentation changes are included in the next release. GitHub
            # keeps only one pending run per concurrency group, so replaced
            # queued runs must not lose their release level.
            branches=()
            breaking_labeled=false
            declare -A seen_prs=()
            last_tag=$(git describe --tags --abbrev=0 --match 'v*' 2>/dev/null || true)
            if [[ -n "$last_tag" ]]; then
              while IFS= read -r sha; do
                while IFS=$'\t' read -r number ref labels; do
                  if [[ -z "$number" ]]; then
                    continue
                  fi
                  if [[ -n "${seen_prs[$number]:-}" ]]; then
                    continue
                  fi
                  seen_prs["$number"]=true

                  files=()
                  while IFS= read -r file; do
                    files+=("$file")
                  done < <(
                    gh api --paginate "repos/${GITHUB_REPOSITORY}/pulls/${number}/files" \
                      --jq '.[].filename'
                  )
                  if [[ "$(
                    bun scripts/release-policy.ts --has-library-changes "${files[@]}"
                  )" != "true" ]]; then
                    continue
                  fi

                  branches+=("$ref")
                  if [[ ",${labels}," == *",breaking,"* ]]; then
                    breaking_labeled=true
                  fi
                done < <(
                  gh api "repos/${GITHUB_REPOSITORY}/commits/${sha}/pulls" \
                    --jq '.[] | select(.base.ref == "main" and .merged_at != null) | [.number, .head.ref, ([.labels[].name] | join(","))] | @tsv'
                )
              done < <(git log "${last_tag}..HEAD" --format=%H)
            fi

            if [[ ${#branches[@]} -eq 0 ]]; then
              branches=("$SOURCE_BRANCH")
              labels=$(gh api "repos/${GITHUB_REPOSITORY}/pulls/${SOURCE_PR}" \
                --jq '[.labels[].name] | join(",")')
              if [[ ",${labels}," == *",breaking,"* ]]; then
                breaking_labeled=true
              fi
            fi

            level=$(bun scripts/release-policy.ts "${branches[@]}")

            if [[ "$level" == "major" && "$breaking_labeled" != "true" ]]; then
              echo "A major release requires the 'breaking' label on a contributing pull request." >&2
              echo "Label the pull request, then re-run this workflow run." >&2
              exit 1
            fi
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          bun run "release:${level}"

          version=$(node -p "require('./package.json').version")
          tag="v${version}"
          git push --atomic origin main "refs/tags/${tag}"

          echo "tag=${tag}" >> "$GITHUB_OUTPUT"
          echo "version=${version}" >> "$GITHUB_OUTPUT"
          echo "prepared=true" >> "$GITHUB_OUTPUT"

      - name: Verify the resumed release
        if: steps.release.outputs.prepared == 'false'
        run: bun run release:check

      - name: Check whether the version is already published
        id: registry
        env:
          RELEASE_VERSION: ${{ steps.release.outputs.version }}
        run: |
          set -euo pipefail

          package_name=$(node -p "require('./package.json').name")
          local_integrity=$(
            npm pack --dry-run --ignore-scripts --json |
              node -e '
                let input = "";
                process.stdin.on("data", (chunk) => (input += chunk));
                process.stdin.on("end", () => {
                  const [packed] = JSON.parse(input);
                  if (!packed?.integrity) throw new Error("npm pack did not return package integrity");
                  process.stdout.write(packed.integrity);
                });
              '
          )

          # Only a definitive E404 means the version is unpublished; any other
          # npm view failure (network, registry outage) must fail the run
          # instead of driving a duplicate publish.
          view_status=0
          view_output=$(npm view "${package_name}@${RELEASE_VERSION}" dist.integrity --json 2>&1) || view_status=$?
          if [[ "$view_status" -ne 0 ]]; then
            if grep -q '"code": *"E404"' <<<"$view_output"; then
              echo "publish_required=true" >> "$GITHUB_OUTPUT"
            else
              echo "Unable to query npm for ${package_name}@${RELEASE_VERSION}:" >&2
              echo "$view_output" >&2
              exit 1
            fi
          else
            registry_integrity=$(
              node -e '
                const value = JSON.parse(process.argv[1]);
                if (typeof value !== "string" || !value)
                  throw new Error("npm view did not return a dist integrity string");
                process.stdout.write(value);
              ' "$view_output"
            )
            if [[ "$registry_integrity" != "$local_integrity" ]]; then
              echo "npm already has ${package_name}@${RELEASE_VERSION} with different contents" >&2
              exit 1
            fi
            echo "publish_required=false" >> "$GITHUB_OUTPUT"
            echo "${package_name}@${RELEASE_VERSION} is already published with matching contents"
          fi

      - name: Publish to npm
        if: steps.registry.outputs.publish_required == 'true'
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npm publish --access public

      - name: Create the GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ steps.release.outputs.tag }}
        run: |
          if gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
            echo "GitHub release ${RELEASE_TAG} already exists"
          else
            gh release create "$RELEASE_TAG" --generate-notes --title "$RELEASE_TAG" --verify-tag
          fi
