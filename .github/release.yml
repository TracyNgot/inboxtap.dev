changelog:
  exclude:
    labels:
      - skip-changelog
  categories:
    - title: "🔥 Breaking changes"
      labels:
        - breaking
    - title: "✨ Features"
      labels:
        - enhancement
        - feature
    - title: "🐛 Fixes"
      labels:
        - bug
    - title: "🔒 Security"
      labels:
        - security
    - title: "📝 Documentation"
      labels:
        - documentation
    - title: "📦 Maintenance"
      labels:
        - dependencies
        - testing
        - maintenance
    - title: "📋 Other changes"
      labels:
        - "*"
