name: Documentation issue
description: Report missing, unclear, or incorrect InboxTap documentation.
title: "📝 "
labels:
  - documentation
body:
  - type: dropdown
    id: locale
    attributes:
      label: Documentation language
      options:
        - English
        - French
        - Spanish
        - All languages
    validations:
      required: true
  - type: input
    id: page
    attributes:
      label: Page or file
      description: Link to the affected page or name the repository file.
      placeholder: https://inboxtap.dev/docs/quick-start
    validations:
      required: true
  - type: textarea
    id: problem
    attributes:
      label: What is missing or incorrect?
      description: Explain what made the documentation confusing or inaccurate.
    validations:
      required: true
  - type: textarea
    id: suggestion
    attributes:
      label: Suggested improvement
      description: Share the wording, example, or structure that would help.
  - type: checkboxes
    id: checks
    attributes:
      label: Before submitting
      options:
        - label: I checked the current documentation and existing issues.
          required: true
        - label: I removed credentials, tokens, and other sensitive data from examples.
          required: true
